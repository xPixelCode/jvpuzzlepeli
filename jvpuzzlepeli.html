<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JV Puzzle — Editor & Peli (.jvpuzzle)</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #071025;
  --panel: #081226;
  --accent: #7c3aed;
  --accent-hover: #9d4edd;
  --muted: #94a3b8;
  --tile-size: 28px;
  --editor-bg: #071025;
  --game-bg: #020617;
}

* {
  box-sizing: border-box;
  font-family: 'Comic Neue', 'Inter', sans-serif;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #111827, #020617);
  color: #e6eef8;
  min-height: 100vh;
}

.app {
  max-width: 1200px;
  margin: 20px auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.card {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(2,6,23,0.6);
}

h1 {
  margin: 0 0 6px;
  font-size: 20px;
  text-shadow: 0 0 10px #60a5fa, 0 0 30px #3b82f6;
}

.panel {
  background: rgba(255,255,255,.08);
  backdrop-filter: blur(12px);
  border-radius: 16px;
}

.cell {
  width: var(--tile-size);
  height: var(--tile-size);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  margin: 1px;
  position: relative;
  background-color: transparent;
}

.cell[data-t="0"] { background: transparent; }
.cell[data-t="1"] { background: #1f2937; }
.cell[data-t="2"] { background: linear-gradient(180deg,#fef3c7,#fde68a); }
.cell[data-t="3"] { background: #facc15; }
.cell[data-t="4"] { background: #10b981; }
.cell[data-t="5"] { background: #ef4444; }
.cell[data-t="6"] { background: #8b5cf6; }
.cell[data-t="7"] { background: #ec4899; }

.cell:not([data-t="0"]) {
  border: 3px solid #000;
  box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2);
}

.cell:hover {
  box-shadow: inset 0 0 0 2px rgba(96,165,250,.6);
}

.cell:active {
  transform: scale(0.94);
}

.cell::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 6px;
  box-shadow: inset 0 0 0 2px rgba(96,165,250,.0);
  transition: box-shadow .08s ease;
  pointer-events: none;
}

.cell:hover::after {
  box-shadow: inset 0 0 0 2px rgba(96,165,250,.65);
}

.cell.player {
  box-shadow: inset 0 0 0 2px rgba(96,165,250,0.9);
  border-radius: 50%;
}

.cell.snap-preview::after {
  box-shadow: inset 0 0 0 2px rgba(124,58,237,.9);
}

p.hint {
  color: var(--muted);
  margin: 6px 0;
}

.start {
  display: flex;
  gap: 12px;
  align-items: center;
}

.bigbtn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}

.bigbtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

.ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.06);
}

.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 16px;
}

.palette {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tile {
  width: 56px;
  height: 56px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.02);
  transition: transform .15s;
}

.tile:hover {
  transform: translateY(-2px);
}

.tile.selected {
  outline: 3px solid #60a5fa;
  outline-offset: 2px;
  box-shadow: 0 0 15px rgba(96,165,250,.6);
}

label {
  font-size: 14px;
}

input[type=number] {
  width: 80px;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  background: transparent;
  color: inherit;
}

button.small {
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
}

button.small.ghost {
  background: white;
  border: 1px solid rgba(255,255,255,0.06);
}

input, textarea, select {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 10px;
  color: white;
  padding: 8px 10px;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #60a5fa;
  box-shadow: 0 0 0 2px rgba(96,165,250,.4);
}

button {
  min-height: 36px;
  padding: 8px 14px;
  line-height: 1.2;
  white-space: nowrap;
  transition: transform .15s, box-shadow .15s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

#editorGrid {
  background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
  padding: 8px;
  border-radius: 8px;
  overflow: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, var(--tile-size));
  gap: 0;
  align-content: start;
}

#editorArea button,
#setPlayerBtn,
#saveJVP,
#resize,
#clear,
#fillWalls {
  font-family: 'Comic Neue', cursive;
  font-weight: 700;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 90px;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#editorArea button:hover,
#setPlayerBtn:hover,
#saveJVP:hover,
#resize:hover,
#clear:hover,
#fillWalls:hover {
  filter: brightness(1.1);
}

#editorArea input[type=number],
#projectName {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.2);
  color: white;
  width: auto;
  min-width: 60px;
  max-width: 180px;
  box-sizing: border-box;
}

#editorArea label {
  display: block;
  margin-bottom: 4px;
  font-size: 13px;
  color: var(--muted);
}

.resize-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 8px;
}

.resize-controls input[type=number] {
  flex: 1;
  min-width: 60px;
}

.resize-controls button {
  flex-shrink: 0;
}

#projectName {
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.2);
  color: white;
  width: 100%;
  max-width: 300px;
}

#editorBgColor, #gameBgColor {
  width: 80px;
  height: 40px;
  padding: 2px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
}

#editorBgImage, #gameBgImage {
  font-size: 12px;
  max-width: 200px;
}

#pastePopup .box textarea {
  resize: none;
  font-family: 'Comic Neue', cursive;
  color: white;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px;
}

.npc-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #1f2937;
  color: white;
  border-radius: 12px;
  padding: 20px;
  width: 300px;
  z-index: 1000;
  display: none;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  font-family: 'Comic', sans-serif;
}

.npc-popup.show { display: block; }
.npc-popup h2 { text-align:center; margin-bottom:10px; }
.npc-popup label { display:block; margin-top:10px; font-size:14px; }
.npc-popup input, .npc-popup textarea, .npc-popup select {
  width:100%; margin-top:4px; padding:6px; border-radius:6px; border:none; font-size:14px;
}
#npcPreviewContainer {
  margin-top:10px; display:flex; justify-content:center; align-items:center;
  height:80px; background:#374151; border-radius:8px;
}
#npcPreview { max-height:100%; max-width:100%; }
.npc-popup-buttons { display:flex; justify-content:space-between; margin-top:15px; }
.npc-popup-buttons button {
  padding:6px 12px; border:none; border-radius:6px; cursor:pointer;
  background:#3b82f6; color:white; font-weight:bold; transition:0.2s;
}
.npc-popup-buttons button:hover { background:#2563eb; }

#popupMessage {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(31, 41, 55, 0.9);
  color: #f9fafb;
  padding: 8px 12px;
  border-radius: 8px;
  font-family: 'Comic Neue', cursive;
  display: none;
  max-width: 90%;
  text-align: center;
  z-index: 999;
}

@media (max-width:900px) {
  .layout { grid-template-columns:1fr; }
  .palette .tile { width:48px; height:48px; }
  .resize-controls { flex-direction: column; gap: 6px; }
  #projectName { max-width: 100%; }
  #editorArea button, #setPlayerBtn, #saveJVP, #resize, #clear, #fillWalls { font-size: 12px; padding: 6px 10px; }
}

.start-menu {
  justify-content: center;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 12px;
}

.start-menu .bigbtn {
  min-width: 180px;
  font-size: 15px;
  letter-spacing: 0.5px;
}

.start-menu .bigbtn.ghost {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
}

.popup {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(5,12,26,0.55);
  backdrop-filter: blur(6px);
  z-index: 9999;
  animation: popupIn .18s ease-out;
}

.popup.show {
  display: flex;
}

.popup .box {
  background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  padding: 18px 20px;
  border-radius: 14px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  max-width: 360px;
  text-align: center;
  animation: popupIn 0.18s ease-out, floatPopup 2s ease-in-out infinite alternate;
}

.popup .box h3 {
  margin: 0 0 8px;
  font-size: 18px;
}

.popup .box p {
  margin: 0 0 14px;
  color: var(--muted);
}

.popup .box button {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
}

@keyframes popupIn {
  from {
    transform: scale(.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes floatPopup {
  0% { transform: translate(-50%, -50%) translateY(0); }
  100% { transform: translate(-50%, -50%) translateY(-3px); }
}

.instructions {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.4;
}

footer {
  color: var(--muted);
  font-size: 13px;
}

.mutedBox {
  padding: 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.02);
  color: var(--muted);
}

.fancy-link {
  color: #7c3aed;
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px dashed rgba(124,58,237,0.6);
  transition: all 0.2s ease;
}

.fancy-link:hover {
  color: #a78bfa;
  border-bottom-color: #a78bfa;
}

canvas#playCanvas {
  border: 6px solid #000;
  border-radius: 8px;
  box-shadow: 0 10px 0 #000, inset 0 0 0 3px rgba(255,255,255,0.08);
  display: block;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.npc-tooltip {
  background: linear-gradient(135deg,#111827,#1f2937);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 10px 30px rgba(0,0,0,.6);
}

*::-webkit-scrollbar {
  width: 10px;
}

*::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,.2);
  border-radius: 10px;
}

#screenFlash {
  position: fixed;
  inset: 0;
  background: rgba(239,68,68,0.45);
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.15s ease;
}

#screenFlash.show {
  opacity: 1;
}

body.popup-open .app {
  filter: blur(6px) brightness(0.9);
}

.settings-modal {
  filter: none !important;
}

#editorHelpPopup {
  filter: none !important;
}

.settings-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #7c3aed, #5b21b6);
  border: 2px solid #a78bfa;
  border-radius: 14px;
  color: #f9fafb;
  font-size: 20px;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 0 0 2px #111827, 0 6px 0 #4c1d95, 0 10px 18px rgba(0,0,0,0.6);
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
}

.settings {
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(circle at top, rgba(120, 72, 38, 0.28), transparent 45%), rgba(10, 6, 4, 0.78);
  backdrop-filter: blur(10px);
}

.settings * {
  pointer-events: auto;
}

.hidden {
  display: none !important;
}

.settings-card {
  width: min(100%, 620px);
  max-height: 85vh;
  overflow-y: auto;
  background: linear-gradient(180deg, #4b2917, #2c160d 52%, #231009);
  border: 4px solid #c48a58;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 12px;
}

.settings-card h2 {
  color: #fde68a;
  font-size: 20px;
  margin-bottom: 20px;
}

.settings-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  align-items: center;
}

.settings-row label {
  flex: 1;
}

.settings-row input[type="color"],
.settings-row textarea {
  flex: 1;
  min-width: 100px;
}

.undo-btn, .redo-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s ease;
}

.undo-btn {
  background: linear-gradient(180deg, #5c6bc0, #3949ab);
  color: white;
}

.undo-btn:hover {
  background: linear-gradient(180deg, #7986cb, #5c6bc0);
  transform: translateY(-2px);
}

.redo-btn {
  background: linear-gradient(180deg, #f06292, #e91e63);
  color: white;
}

.redo-btn:hover {
  background: linear-gradient(180deg, #f48fb1, #f06292);
  transform: translateY(-2px);
}

.play-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
}

.play-screen.show {
  display: flex;
}

.splash-screen {
  text-align: center;
  padding: 40px;
}

.splash-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 32px;
  color: #60a5fa;
  text-shadow: 0 0 20px #60a5fa, 0 0 40px #3b82f6;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.splash-subtitle {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 30px;
}

.editor-area {
  display: none;
}

.editor-area.show {
  display: block;
}

</style>
</head>
<body>

<div class="app" id="app">
  <!-- EDITOR NÄKYMÄ -->
  <div class="editor-area" id="editorArea">
    <h1>🎨 JV Puzzle Editor</h1>
    
    <div class="card">
      <label for="projectName">Projektin nimi:</label>
      <input type="text" id="projectName" placeholder="Nimi tähän..." />
    </div>

    <div class="card layout">
      <div>
        <h3>Väripaletti</h3>
        <div class="palette" id="palette"></div>
        
        <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
        
        <h3>Editorin tausta</h3>
        <div class="settings-row">
          <label>Väri:</label>
          <input type="color" id="editorBgColor" value="#071025">
        </div>
        <div class="settings-row">
          <label>URL/Base64:</label>
          <input type="text" id="editorBgImage" placeholder="https://... tai data:image/..." />
          <button class="small" onclick="updateEditorBackground()">Päivitä</button>
        </div>

        <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
        
        <h3>Pelin tausta</h3>
        <div class="settings-row">
          <label>Väri:</label>
          <input type="color" id="gameBgColor" value="#020617">
        </div>
        <div class="settings-row">
          <label>URL/Base64:</label>
          <input type="text" id="gameBgImage" placeholder="https://... tai data:image/..." />
          <button class="small" onclick="updateGameBackground()">Päivitä</button>
        </div>

        <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">

        <h3>Ruudukko</h3>
        <div class="resize-controls">
          <label>Leveys:</label>
          <input type="number" id="gridWidth" min="5" max="32" value="16" />
          <label>Korkeus:</label>
          <input type="number" id="gridHeight" min="5" max="32" value="10" />
          <button id="resize">Muuta koko</button>
        </div>

        <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">

        <button id="clear">Tyhjennä</button>
        <button id="fillWalls">Täytä seinät</button>
        <button id="setPlayerBtn">Aseta pelaaja</button>
        
        <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">

        <button id="saveJVP" style="background: linear-gradient(135deg, #10b981, #059669);">💾 Lataa (.jvpuzzle)</button>
        <button id="loadJVP" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">📂 Lataa tiedosto</button>
        <input type="file" id="loadFile" accept=".jvpuzzle,.json" style="display:none;" />

        <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">

        <button id="undoBtn" class="undo-btn">↶ Undo</button>
        <button id="redoBtn" class="redo-btn">↷ Redo</button>
      </div>

      <div>
        <h3>Ruudukko</h3>
        <div id="editorGrid"></div>
      </div>
    </div>
  </div>

  <!-- PELI NÄKYMÄ -->
  <div class="play-screen" id="playScreen">
    <canvas id="playCanvas"></canvas>
    <div id="popupMessage"></div>
  </div>

  <!-- SPLASH SCREEN -->
  <div class="splash-screen" id="splashScreen" style="text-align: center; padding: 40px; display: none;">
    <div class="splash-title">JV PUZZLE</div>
    <div class="splash-subtitle">Lataa kartta aloittaaksesi pelin</div>
  </div>
</div>

<script>
// ============================================================================
// JV PUZZLE EDITOR & GAME
// ============================================================================

const COLORS = [
  { type: 0, label: 'Tyhjä', color: 'transparent' },
  { type: 1, label: 'Seinä', color: '#1f2937' },
  { type: 2, label: 'Portaali', color: '#fef3c7' },
  { type: 3, label: 'Kolikko', color: '#facc15' },
  { type: 4, label: 'Hiekka', color: '#10b981' },
  { type: 5, label: 'Lava', color: '#ef4444' },
  { type: 6, label: 'Noita', color: '#8b5cf6' },
  { type: 7, label: 'Vihollinen', color: '#ec4899' },
];

// State
let gameState = {
  grid: [],
  width: 16,
  height: 10,
  playerPos: null,
  projectName: 'Uusi Projekti',
  editorBg: {
    color: '#071025',
    image: null,
    size: 'cover',
    position: 'center',
    repeat: 'no-repeat'
  },
  gameBg: {
    color: '#020617',
    image: null,
    size: 'cover',
    position: 'center',
    repeat: 'no-repeat'
  }
};

let selectedColor = 0;
let undoStack = [];
let redoStack = [];
let isDragging = false;
let gameLoaded = false;
let isPlayMode = false;

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  initializeEditor();
  setupEventListeners();
  loadFromLocalStorage();
  renderGrid();
});

function initializeEditor() {
  // Create color palette
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  COLORS.forEach(color => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    if (color.type === selectedColor) tile.classList.add('selected');
    tile.style.background = color.color === 'transparent' ? '#1a1a2e' : color.color;
    tile.title = color.label;
    tile.onclick = () => selectColor(color.type);
    palette.appendChild(tile);
  });

  // Initialize grid
  createGrid(gameState.width, gameState.height);
  document.getElementById('projectName').value = gameState.projectName;
  document.getElementById('editorBgColor').value = gameState.editorBg.color;
  document.getElementById('gameBgColor').value = gameState.gameBg.color;
  if (gameState.editorBg.image) {
    document.getElementById('editorBgImage').value = gameState.editorBg.image;
  }
  if (gameState.gameBg.image) {
    document.getElementById('gameBgImage').value = gameState.gameBg.image;
  }

  updateEditorBackground();
  applyEditorBackground();
}

function setupEventListeners() {
  document.getElementById('resize').onclick = resizeGrid;
  document.getElementById('clear').onclick = clearGrid;
  document.getElementById('fillWalls').onclick = fillWalls;
  document.getElementById('setPlayerBtn').onclick = () => {
    selectedColor = 'player';
    updatePalette();
  };
  document.getElementById('saveJVP').onclick = saveProject;
  document.getElementById('loadJVP').onclick = () => document.getElementById('loadFile').click();
  document.getElementById('loadFile').onchange = loadProject;
  document.getElementById('undoBtn').onclick = undo;
  document.getElementById('redoBtn').onclick = redo;
  document.getElementById('projectName').onchange = (e) => {
    gameState.projectName = e.target.value;
  };

  document.getElementById('editorBgColor').onchange = (e) => {
    gameState.editorBg.color = e.target.value;
    applyEditorBackground();
    saveToLocalStorage();
  };

  document.getElementById('gameBgColor').onchange = (e) => {
    gameState.gameBg.color = e.target.value;
    saveToLocalStorage();
  };
}

function selectColor(type) {
  selectedColor = type;
  updatePalette();
}

function updatePalette() {
  document.querySelectorAll('.palette .tile').forEach((tile, i) => {
    tile.classList.toggle('selected', COLORS[i].type === selectedColor);
  });
}

function createGrid(w, h) {
  gameState.width = w;
  gameState.height = h;

  // Pad grid if needed
  while (gameState.grid.length < w * h) {
    gameState.grid.push(0);
  }
  gameState.grid.length = w * h;

  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('editorGrid');
  grid.style.gridTemplateColumns = `repeat(${gameState.width}, var(--tile-size))`;
  
  // Clear and recreate
  grid.innerHTML = '';
  
  for (let i = 0; i < gameState.grid.length; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.t = gameState.grid[i];
    cell.dataset.index = i;

    if (gameState.playerPos === i) {
      cell.classList.add('player');
    }

    cell.onmousedown = (e) => startPaint(i);
    cell.onmouseenter = (e) => continuePaint(i, e);
    cell.onmouseup = stopPaint;
    cell.onmouseleave = (e) => {
      if (!isDragging) stopPaint();
    };

    grid.appendChild(cell);
  }
}

function startPaint(index) {
  isDragging = true;
  pushUndo();
  paintCell(index);
}

function continuePaint(index, event) {
  if (!isDragging || event.buttons !== 1) return;
  paintCell(index);
}

function stopPaint() {
  isDragging = false;
}

function paintCell(index) {
  if (selectedColor === 'player') {
    gameState.playerPos = index;
    renderGrid();
  } else {
    gameState.grid[index] = selectedColor;
    const cell = document.querySelector(`[data-index="${index}"]`);
    if (cell) {
      cell.dataset.t = selectedColor;
    }
  }
  saveToLocalStorage();
}

function resizeGrid() {
  const w = parseInt(document.getElementById('gridWidth').value);
  const h = parseInt(document.getElementById('gridHeight').value);
  createGrid(w, h);
}

function clearGrid() {
  pushUndo();
  gameState.grid.fill(0);
  gameState.playerPos = null;
  renderGrid();
  saveToLocalStorage();
}

function fillWalls() {
  pushUndo();
  gameState.grid.fill(1);
  renderGrid();
  saveToLocalStorage();
}

function updateEditorBackground() {
  const url = document.getElementById('editorBgImage').value;
  if (url) {
    gameState.editorBg.image = url;
  }
  applyEditorBackground();
  saveToLocalStorage();
}

function updateGameBackground() {
  const url = document.getElementById('gameBgImage').value;
  if (url) {
    gameState.gameBg.image = url;
  }
  saveToLocalStorage();
}

function applyEditorBackground() {
  const editorArea = document.getElementById('editorArea');
  const bgStyle = gameState.editorBg;
  
  if (bgStyle.image && (bgStyle.image.startsWith('http') || bgStyle.image.startsWith('data:'))) {
    editorArea.style.backgroundImage = `url('${bgStyle.image}')`;
    editorArea.style.backgroundSize = bgStyle.size;
    editorArea.style.backgroundPosition = bgStyle.position;
    editorArea.style.backgroundRepeat = bgStyle.repeat;
  } else {
    editorArea.style.backgroundImage = 'none';
  }
  
  editorArea.style.backgroundColor = bgStyle.color;
}

function applyGameBackground(canvas) {
  const bgStyle = gameState.gameBg;
  const ctx = canvas.getContext('2d');
  
  if (bgStyle.image && (bgStyle.image.startsWith('http') || bgStyle.image.startsWith('data:'))) {
    canvas.style.backgroundImage = `url('${bgStyle.image}')`;
    canvas.style.backgroundSize = bgStyle.size;
    canvas.style.backgroundPosition = bgStyle.position;
    canvas.style.backgroundRepeat = bgStyle.repeat;
  } else {
    canvas.style.backgroundImage = 'none';
  }
  
  canvas.style.backgroundColor = bgStyle.color;
}

function pushUndo() {
  redoStack = [];
  undoStack.push(JSON.stringify(gameState.grid));
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(JSON.stringify(gameState.grid));
  gameState.grid = JSON.parse(undoStack.pop());
  renderGrid();
  saveToLocalStorage();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(JSON.stringify(gameState.grid));
  gameState.grid = JSON.parse(redoStack.pop());
  renderGrid();
  saveToLocalStorage();
}

function saveProject() {
  const data = {
    version: 2,
    projectName: gameState.projectName,
    width: gameState.width,
    height: gameState.height,
    grid: gameState.grid,
    playerPos: gameState.playerPos,
    editorBg: gameState.editorBg,
    gameBg: gameState.gameBg
  };

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (gameState.projectName || 'puzzle') + '.jvpuzzle';
  a.click();
  URL.revokeObjectURL(url);
}

function loadProject(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = JSON.parse(evt.target.result);
      
      // Backward compatibility
      gameState.projectName = data.projectName || 'Projekti';
      gameState.width = data.width || 16;
      gameState.height = data.height || 10;
      gameState.grid = data.grid || [];
      gameState.playerPos = data.playerPos || null;
      
      // Load background settings
      if (data.editorBg) {
        gameState.editorBg = { ...gameState.editorBg, ...data.editorBg };
      }
      if (data.gameBg) {
        gameState.gameBg = { ...gameState.gameBg, ...data.gameBg };
      }

      initializeEditor();
      saveToLocalStorage();
      alert('Projekti ladattu!');
    } catch (err) {
      alert('Virhe ladatessa: ' + err.message);
    }
  };
  reader.readAsText(file);
  
  // Reset file input
  e.target.value = '';
}

function saveToLocalStorage() {
  try {
    localStorage.setItem('jvpuzzle_project', JSON.stringify(gameState));
  } catch (e) {
    console.error('LocalStorage error:', e);
  }
}

function loadFromLocalStorage() {
  try {
    const saved = localStorage.getItem('jvpuzzle_project');
    if (saved) {
      const data = JSON.parse(saved);
      Object.assign(gameState, data);
    }
  } catch (e) {
    console.error('LocalStorage error:', e);
  }
}

// Expose play function for testing
window.playGame = function() {
  isPlayMode = true;
  gameLoaded = true;
  
  document.getElementById('editorArea').classList.remove('show');
  document.getElementById('playScreen').classList.add('show');
  document.getElementById('splashScreen').style.display = 'none';

  const canvas = document.getElementById('playCanvas');
  applyGameBackground(canvas);
  
  setTimeout(() => {
    renderGame();
  }, 100);
};

window.stopGame = function() {
  isPlayMode = false;
  document.getElementById('editorArea').classList.add('show');
  document.getElementById('playScreen').classList.remove('show');
};

function renderGame() {
  const canvas = document.getElementById('playCanvas');
  const ctx = canvas.getContext('2d');
  
  const cellSize = 32;
  canvas.width = gameState.width * cellSize;
  canvas.height = gameState.height * cellSize;

  // Clear and draw background
  ctx.fillStyle = gameState.gameBg.color;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw grid
  for (let i = 0; i < gameState.grid.length; i++) {
    const type = gameState.grid[i];
    const col = i % gameState.width;
    const row = Math.floor(i / gameState.width);
    const x = col * cellSize;
    const y = row * cellSize;

    const color = COLORS.find(c => c.type === type)?.color || 'transparent';
    if (color !== 'transparent') {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, cellSize, cellSize);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, cellSize, cellSize);
    }
  }

  // Draw player
  if (gameState.playerPos !== null) {
    const col = gameState.playerPos % gameState.width;
    const row = Math.floor(gameState.playerPos / gameState.width);
    ctx.fillStyle = '#60a5fa';
    ctx.beginPath();
    ctx.arc(col * cellSize + cellSize / 2, row * cellSize + cellSize / 2, cellSize / 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Editor mode default
document.getElementById('editorArea').classList.add('show');
applyEditorBackground();
</script>
